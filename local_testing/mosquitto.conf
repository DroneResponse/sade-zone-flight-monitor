# Mosquitto config for the docker-compose local stack.
#
# Eclipse Mosquitto 2.x defaults to no listener and anonymous=false, so a
# config file is required to accept connections from the Flight Monitor.
# This file is bind-mounted into the broker container by docker-compose.yml
# at /mosquitto/config/mosquitto.conf.
#
# Intentionally minimal — anonymous + unauthenticated, suitable only for
# local development against a non-public broker. Do NOT reuse for any
# deployment reachable beyond the loopback / compose network.

listener 1883
allow_anonymous true
